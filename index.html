<!doctype html>
<html lang="es" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <!-- <link rel="icon" type="image/svg+xml" href="/favicon.svg" /> -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Game Vault</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body class="bg-dark-subtle">
    <header
      class="container-xl bg-dark border-start border-bottom border-end sticky-top"
    >
      <nav class="navbar">
        <div
          class="container-fluid d-flex align-items-center justify-content-between"
        >
          <div class="navbar-brand d-inline-flex align-items-center m-0">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              style="color: #00ce7a"
              class="me-2"
            >
              <line x1="6" y1="12" x2="10" y2="12"></line>
              <line x1="8" y1="10" x2="8" y2="14"></line>
              <line x1="15" y1="13" x2="15.01" y2="13"></line>
              <line x1="18" y1="11" x2="18.01" y2="11"></line>
              <rect width="20" height="12" x="2" y="6" rx="2"></rect>
            </svg>
            <h1 class="text-white m-0 fs-4 fw-bold">Game Vault</h1>
          </div>
          <div class="d-flex align-items-center ms-auto">
            <a
              data-bs-toggle="modal"
              href="#contactModal"
              role="button"
              class="text-white text-decoration-none me-3"
            >
              Contacto
            </a>
            <a
              data-bs-toggle="offcanvas"
              href="#offcanvas-cart"
              role="button"
              class="position-relative d-inline-block"
            >
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="9" cy="21" r="1"></circle>
                <circle cx="20" cy="21" r="1"></circle>
                <path
                  d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"
                ></path>
              </svg>
              <span
                class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                id="cart-count"
              >
                0
                <span class="visually-hidden">Artículos en el carrito</span>
              </span>
            </a>
          </div>
        </div>
      </nav>
    </header>
    <main class="container-xl border-start border-bottom border-end">
      <section
        id="products"
        class="row row-cols-1 row-cols-md-2 row-cols-lg-3 px-2 py-2 g-3"
      ></section>
    </main>
    <footer class="container-xl border-start border-end text-center py-3">
      <time>2026</time>
    </footer>
    <div class="offcanvas offcanvas-end" tabindex="-1" id="offcanvas-cart">
      <div class="offcanvas-header">
        <h5 class="offcanvas-title">Carrito de compras</h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="offcanvas"
        ></button>
      </div>
      <div class="offcanvas-body d-flex flex-column justify-content-between">
        <ul class="list-group list-group-flush mb-3"></ul>
        <div class="border-top pt-3 mt-auto">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <span class="fs-5 text-secondary">Total</span>
            <strong class="fs-3 text-success" id="cart-total">$0.00</strong>
          </div>
          <button
            type="button"
            class="btn btn-success w-100 mb-2 fw-bold"
            data-bs-toggle="offcanvas"
            data-bs-target="#offcanvas-cart"
            id="cart-btn-buy"
          >
            INICIAR COMPRA
          </button>
          <button
            type="button"
            class="btn btn-outline-danger w-100 fw-bold"
            data-bs-toggle="offcanvas"
            data-bs-target="#offcanvas-cart"
            id="cart-btn-clear"
          >
            VACIAR CARRITO
          </button>
        </div>
      </div>
    </div>
    <div
      class="modal fade"
      id="contactModal"
      data-bs-backdrop="static"
      tabindex="-1"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h1 class="modal-title fs-5">Contacto</h1>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <form
              action="https://formsubmit.co/ricardo.perez.brivio@gmail.com"
              method="POST"
              enctype="multipart/form-data"
              target="_blank"
              id="contactForm"
            >
              <div class="mb-3">
                <label for="contactName" class="form-label"
                  >Nombre (requerido)</label
                >
                <input
                  id="contactName"
                  type="text"
                  class="form-control"
                  placeholder="Ej: Juan Pérez"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="contactEmail" class="form-label"
                  >Correo electrónico (requerido)</label
                >
                <input
                  id="contactEmail"
                  type="email"
                  class="form-control"
                  placeholder="Ej: correo@example.com"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="contactMessage" class="form-label"
                  >Mensaje (requerido)</label
                >
                <textarea
                  id="contactMessage"
                  class="form-control"
                  rows="3"
                  placeholder="Escriba su mensaje aquí..."
                  required
                ></textarea>
              </div>
              <div
                class="d-flex flex-column d-sm-flex flex-sm-row justify-content-sm-end gap-2"
              >
                <button type="reset" class="btn btn-secondary">
                  Limpiar formulario
                </button>
                <button type="submit" class="btn btn-success">
                  Enviar mensaje
                </button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
    <template id="product-template">
      <div class="col">
        <article class="card rounded-4 shadow overflow-hidden h-100">
          <img
            class="card-img-top object-fit-cover"
            alt="ALT"
            src="SRC"
            style="height: 200px"
          />
          <div class="card-body d-flex flex-column">
            <div class="text-center flex-grow-1">
              <time class="card-subtitle mb-2 text-body-secondary">YEAR</time>
              <h2 class="card-title text-light fs-4 m-0">TITLE</h2>
              <p class="js-platform-container card-text mb-2">
                <span
                  class="border border-light text-light rounded-1 px-2 mx-1 lh-1 small bg-light-subtle d-inline-block"
                >
                  PLATFORM
                </span>
              </p>
              <p class="card-text">
                <strong>Genres: </strong><span class="js-genres">GENRES</span>
              </p>
            </div>
            <hr class="my-1" />
            <div class="d-flex justify-content-between align-items-center mb-3">
              <div>
                <strong>Rating: </strong>
                <span
                  class="js-rating border border-success-subtle text-success-emphasis rounded-1 px-2 lh-1 small bg-success-subtle"
                >
                  RATING
                </span>
              </div>
              <strong class="text-success-emphasis fs-2"
                >$ <span class="js-price">PRICE</span>
              </strong>
            </div>
            <button
              type="button"
              class="btn btn-light w-100"
              data-bs-toggle="offcanvas"
              data-bs-target="#offcanvas-cart"
            >
              <strong>AGREGAR AL CARRITO</strong>
            </button>
          </div>
        </article>
      </div>
    </template>
    <template id="cart-item-template">
      <li class="list-group-item bg-transparent text-light px-0 py-2">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <h6 class="my-0 text-white fw-bold">TITLE</h6>
            <small class="text-secondary">PRICE</small>
          </div>
          <div class="text-end">
            <span
              class="badge bg-light text-dark rounded-pill js-cart-item-qty"
            >
              QUANTITY
            </span>
            <div class="fw-semibold text-success js-cart-item-subtotal">
              SUBTOTAL
            </div>
            <button
              type="button"
              class="btn btn-sm btn-link text-danger p-0 border-0"
            >
              Eliminar
            </button>
          </div>
        </div>
      </li>
    </template>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
